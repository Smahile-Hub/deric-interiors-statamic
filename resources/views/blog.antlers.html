<section style="padding:160px 0 3rem;background:#1a1b21;">
  <div class="shell">
    <span class="eyebrow">{{ category }}</span>
    <h1 style="font-family:var(--font-display);font-size:clamp(2.4rem,5vw,4.5rem);color:#e5e1ea;font-weight:400;margin:.5rem 0 1rem;line-height:1.1;">{{ title }}</h1>
    <div style="display:flex;gap:1.5rem;align-items:center;color:#8c867d;font-size:.88rem;margin-top:1rem;">
      <span>By {{ author }}</span>
      <span>{{ date format="d F Y" }}</span>
      <span>{{ reading_time }}</span>
    </div>
  </div>
</section>

{{ if image }}
  <div style="max-height:600px;overflow:hidden;">
    <img src="{{ image }}" alt="{{ title }}" style="width:100%;height:600px;object-fit:cover;">
  </div>
{{ /if }}

<section style="padding:4rem 0 6rem;" data-reveal>
  <div class="shell">
    <div style="max-width:740px;margin:0 auto;">
      <div class="blog-content" style="color:#d4c0ab;line-height:1.8;font-size:1.05rem;">
        {{ content }}
      </div>
      <div style="margin-top:4rem;padding-top:2rem;border-top:1px solid rgba(80,69,51,0.2);">
        <a href="/blog" class="btn-secondary">&#8592; Back to Blog</a>
      </div>
    </div>
  </div>
</section>

<style>
.blog-content h2 { font-family:var(--font-display);font-size:clamp(1.6rem,3vw,2.2rem);color:#e5e1ea;font-weight:400;margin:2.5rem 0 1rem; }
.blog-content h3 { font-family:var(--font-display);font-size:1.4rem;color:#e5e1ea;font-weight:400;margin:2rem 0 .75rem; }
.blog-content p { margin-bottom:1.5rem; }
.blog-content ul, .blog-content ol { padding-left:1.5rem;margin-bottom:1.5rem; }
.blog-content li { margin-bottom:.5rem; }
.blog-content strong { color:#f0ece4; }
.blog-content blockquote { border-left:3px solid var(--gold);padding-left:1.5rem;margin:2rem 0;font-style:italic;color:#b1a18d; }
</style>
