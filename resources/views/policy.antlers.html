<section style="padding:160px 0 3rem;background:#1a1b21;">
  <div class="shell">
    <h1 style="font-family:var(--font-display);font-size:clamp(2rem,4vw,3.5rem);color:#e5e1ea;font-weight:400;margin-bottom:.5rem;">{{ title }}</h1>
    <p style="color:#8c867d;font-size:.88rem;">Last updated: {{ last_updated }}</p>
  </div>
</section>

<section style="padding:4rem 0 6rem;" data-reveal>
  <div class="shell">
    <div style="max-width:740px;" class="policy-content">
      {{ content | markdown }}
    </div>
  </div>
</section>

<style>
.policy-content h2 { font-family:var(--font-display);font-size:clamp(1.4rem,2.5vw,1.8rem);color:#e5e1ea;font-weight:400;margin:2.5rem 0 .75rem; }
.policy-content h3 { color:var(--gold-light);font-size:.9rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin:2rem 0 .5rem; }
.policy-content p { color:#b1a18d;line-height:1.8;margin-bottom:1.25rem;font-size:.95rem; }
.policy-content ul, .policy-content ol { padding-left:1.5rem;margin-bottom:1.25rem; }
.policy-content li { color:#b1a18d;font-size:.95rem;line-height:1.8;margin-bottom:.4rem; }
.policy-content strong { color:#d4c0ab; }
</style>
