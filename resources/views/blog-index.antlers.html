<section class="hero" style="background:#1a1b21;min-height:440px;padding:180px 0 4rem;">
  <div class="hero-inner shell">
    <h1 class="hero-title" style="font-size:clamp(3rem,6vw,6rem);">{{ hero_heading }}</h1>
    <p class="hero-sub">{{ hero_subtext }}</p>
  </div>
</section>

<section style="padding:5rem 0;" data-reveal>
  <div class="shell">
    <div class="blog-grid">
      {{ collection:blog sort="date:desc" }}
        <a href="{{ url }}" class="blog-card" style="display:grid;gap:1rem;color:inherit;">
          <div class="blog-card-media">
            <img src="{{ image }}" alt="{{ title }}" loading="lazy">
          </div>
          <div class="blog-card-body">
            <span class="blog-category">{{ category }}</span>
            <h3 class="blog-card-title">{{ title }}</h3>
            <p class="blog-excerpt">{{ excerpt }}</p>
            <div class="blog-meta">
              <span style="color:#8c867d;font-size:.8rem;">{{ date format="d M Y" }}</span>
              <span class="blog-reading-time">{{ reading_time }}</span>
            </div>
          </div>
        </a>
      {{ /collection:blog }}
    </div>
  </div>
</section>
