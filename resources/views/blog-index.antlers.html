<div class="journal-page">
  <section class="journal-hero">
    <div class="journal-hero-inner" data-reveal>
      <p data-text-control data-text-size-step="{{ blog_hero_eyebrow_text_style:size }}" data-text-height-step="{{ blog_hero_eyebrow_text_style:height }}" data-text-width-step="{{ blog_hero_eyebrow_text_style:width }}">{{ blog_hero_eyebrow }}</p>
      <h1 data-text-control data-text-size-step="{{ blog_hero_title_text_style:size }}" data-text-height-step="{{ blog_hero_title_text_style:height }}" data-text-width-step="{{ blog_hero_title_text_style:width }}">{{ blog_hero_title }}</h1>
      <span data-text-control data-text-size-step="{{ blog_hero_description_text_style:size }}" data-text-height-step="{{ blog_hero_description_text_style:height }}" data-text-width-step="{{ blog_hero_description_text_style:width }}">{{ blog_hero_description }}</span>
    </div>
  </section>

  <section class="journal-grid-section">
    <div class="journal-grid">
      {{ collection:blog sort="date:desc" }}
        <article class="journal-card" data-reveal style="--stagger-index: {{ index }};">
          <a href="{{ url }}" class="journal-card-link" aria-label="Read {{ title }}">
            <div class="journal-card-media">
              <img
                class="journal-cover-image"
                src="{{ cover_image_url ?? image }}"
                alt="{{ cover_image_alt ?? title }}"
                loading="lazy"
              >
            </div>

            <div class="journal-card-copy">
              <div class="journal-meta-row">
                <span data-text-control data-text-size-step="{{ category_text_style:size }}" data-text-height-step="{{ category_text_style:height }}" data-text-width-step="{{ category_text_style:width }}">{{ category }}</span>
                <span>{{ date format="F j, Y" }}</span>
              </div>

              <h2 data-text-control data-text-size-step="{{ title_text_style:size }}" data-text-height-step="{{ title_text_style:height }}" data-text-width-step="{{ title_text_style:width }}">{{ title }}</h2>
              <p data-text-control data-text-size-step="{{ excerpt_text_style:size }}" data-text-height-step="{{ excerpt_text_style:height }}" data-text-width-step="{{ excerpt_text_style:width }}">{{ excerpt }}</p>

              <div class="journal-meta-footer">
                <span data-text-control data-text-size-step="{{ reading_minutes_text_style:size }}" data-text-height-step="{{ reading_minutes_text_style:height }}" data-text-width-step="{{ reading_minutes_text_style:width }}">{{ reading_minutes ?? reading_time }}</span>
                <span class="journal-read-link">Read article</span>
              </div>
            </div>
          </a>
        </article>
      {{ /collection:blog }}
    </div>
  </section>
</div>

<script>
  (() => {
    const pageRoot = document.querySelector('.journal-page');

    if (!pageRoot) {
      return;
    }

    const revealItems = pageRoot.querySelectorAll('[data-reveal]');

    if (typeof IntersectionObserver === 'undefined') {
      revealItems.forEach((element) => {
        element.dataset.visible = 'true';
      });
      return;
    }

    const observer = new IntersectionObserver((entries) => {
      entries.forEach((entry) => {
        if (entry.isIntersecting) {
          entry.target.dataset.visible = 'true';
          observer.unobserve(entry.target);
        }
      });
    }, {
      threshold: 0.16,
      rootMargin: '0px 0px -12% 0px'
    });

    revealItems.forEach((element) => {
      observer.observe(element);
    });
  })();
</script>
