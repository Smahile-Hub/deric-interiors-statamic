title: 'Book Appointment Page'
sections:
  hero:
    display: Hero
    fields:
      -
        handle: title
        field:
          type: text
          display: 'Page Title'
          required: true
      -
        handle: title_text_style
        field:
          type: text_style
          display: 'Page Title Text Controls'
          instructions: 'Use the plus and minus buttons to adjust this text. Reset returns it to the original design.'
      -
        handle: book_hero_eyebrow
        field:
          type: text
          display: Eyebrow
      -
        handle: book_hero_eyebrow_text_style
        field:
          type: text_style
          display: 'Eyebrow Text Controls'
          instructions: 'Use the plus and minus buttons to adjust this text. Reset returns it to the original design.'
      -
        handle: book_hero_title_top
        field:
          type: text
          display: 'Title Top'
      -
        handle: book_hero_title_top_text_style
        field:
          type: text_style
          display: 'Title Top Text Controls'
          instructions: 'Use the plus and minus buttons to adjust this text. Reset returns it to the original design.'
      -
        handle: book_hero_title_bottom
        field:
          type: text
          display: 'Title Bottom'
      -
        handle: book_hero_title_bottom_text_style
        field:
          type: text_style
          display: 'Title Bottom Text Controls'
          instructions: 'Use the plus and minus buttons to adjust this text. Reset returns it to the original design.'
      -
        handle: book_hero_description
        field:
          type: textarea
          display: Description
      -
        handle: book_hero_description_text_style
        field:
          type: text_style
          display: 'Description Text Controls'
          instructions: 'Use the plus and minus buttons to adjust this text. Reset returns it to the original design.'
      -
        handle: book_hero_background_image
        field:
          type: assets
          display: 'Background Image'
          container: assets
          max_files: 1
      -
        handle: book_hero_background_alt
        field:
          type: text
          display: 'Background Image Alt'
      -
        handle: book_hero_button_label
        field:
          type: text
          display: 'Button Label'
      -
        handle: book_hero_button_label_text_style
        field:
          type: text_style
          display: 'Button Label Text Controls'
          instructions: 'Use the plus and minus buttons to adjust this text. Reset returns it to the original design.'
  expectation:
    display: 'What To Expect'
    fields:
      -
        handle: book_expect_eyebrow
        field:
          type: text
          display: Eyebrow
      -
        handle: book_expect_eyebrow_text_style
        field:
          type: text_style
          display: 'Eyebrow Text Controls'
          instructions: 'Use the plus and minus buttons to adjust this text. Reset returns it to the original design.'
      -
        handle: book_expect_title
        field:
          type: text
          display: Title
      -
        handle: book_expect_title_text_style
        field:
          type: text_style
          display: 'Title Text Controls'
          instructions: 'Use the plus and minus buttons to adjust this text. Reset returns it to the original design.'
      -
        handle: book_expect_items
        field:
          type: grid
          display: Items
          add_row: 'Add Item'
          fields:
            -
              handle: icon
              field:
                type: select
                display: Icon
                options:
                  user: User
                  clock: Clock
                  layout: Layout
                  message: Message
            -
              handle: title
              field:
                type: text
                display: Title
            -
              handle: title_text_style
              field:
                type: text_style
                display: 'Title Text Controls'
                instructions: 'Use the plus and minus buttons to adjust this text. Reset returns it to the original design.'
            -
              handle: body
              field:
                type: textarea
                display: Body
            -
              handle: body_text_style
              field:
                type: text_style
                display: 'Body Text Controls'
                instructions: 'Use the plus and minus buttons to adjust this text. Reset returns it to the original design.'
  form:
    display: 'Booking Form'
