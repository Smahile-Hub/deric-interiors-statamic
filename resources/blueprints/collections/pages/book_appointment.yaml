      -
        handle: book_form_title
        field:
          type: text
          display: Title
      -
        handle: book_form_title_text_style
        field:
          type: text_style
          display: 'Title Text Controls'
          instructions: 'Use the plus and minus buttons to adjust this text. Reset returns it to the original design.'
      -
        handle: book_success_icon
        field:
