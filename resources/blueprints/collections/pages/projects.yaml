title: 'Projects Page'
sections:
  hero:
    display: Hero
    fields:
      -
        handle: title
        field:
          type: text
          display: 'Page Title'
          required: true
      -
        handle: title_text_style
        field:
          type: text_style
          display: 'Page Title Style'
      -
        handle: projects_hero_eyebrow
        field:
          type: text
          display: Eyebrow
      -
        handle: projects_hero_eyebrow_text_style
        field:
          type: text_style
          display: 'Eyebrow Style'
      -
        handle: projects_hero_title_line_one
        field:
          type: text
          display: 'Title Line One'
      -
        handle: projects_hero_title_line_one_text_style
        field:
          type: text_style
          display: 'Title Line One Style'
      -
        handle: projects_hero_title_line_two
        field:
          type: text
          display: 'Title Line Two'
      -
        handle: projects_hero_title_line_two_text_style
        field:
          type: text_style
          display: 'Title Line Two Style'
      -
        handle: projects_hero_description
        field:
          type: textarea
          display: Description
      -
        handle: projects_hero_description_text_style
        field:
          type: text_style
          display: 'Description Style'
      -
        handle: projects_hero_background_image
        field:
          type: assets
          display: 'Background Image'
          container: assets
          max_files: 1
      -
        handle: projects_hero_background_alt
        field:
          type: text
          display: 'Background Image Alt'
  filters:
    display: Filters
    fields:
      -
        handle: projects_filters
        field:
          type: list
          display: 'Filter Labels'
          instructions: 'One filter label per line.'
      -
        handle: projects_filters_text_style
        field:
          type: text_style
          display: 'Filter Labels Style'
  gallery:
    display: Gallery
    fields:
      -
        handle: project_items
        field:
          type: grid
          display: 'Project Items'
          mode: stacked
          fullscreen: true
          add_row: 'Add Project'
          fields:
            -
              handle: id
              field:
                type: text
                display: ID
                width: 25
            -
              handle: title
              field:
                type: text
                display: Title
                width: 50
            -
              handle: excerpt
              field:
                type: textarea
                display: Excerpt
                width: 100
            -
              handle: category
              field:
                type: select
                display: Category
                width: 50
                options:
                  Residential: Residential
                  Commercial: Commercial
                  Workplace: Workplace
            -
              handle: size
              field:
                type: select
                display: 'Card Size'
                default: medium
                width: 50
                options:
                  large: Large
                  medium: Medium
                  small: Small
            -
              handle: image
              field:
                type: assets
                display: Image
                container: assets
                max_files: 1
                width: 50
            -
              handle: image_alt
              field:
                type: text
                display: 'Image Alt'
                width: 50
            -
              handle: link_label
              field:
                type: text
                display: 'Link Label'
                width: 50
            -
              handle: link_href
              field:
                type: text
                display: 'Link URL'
                width: 50
      -
        handle: projects_empty_state
        field:
          type: text
          display: 'Empty State Message'
      -
        handle: projects_empty_state_text_style
        field:
          type: text_style
          display: 'Empty State Message Style'
  cta:
    display: 'Final CTA'
    fields:
      -
        handle: projects_cta_title_line_one
        field:
          type: text
          display: 'CTA Title Line One'
      -
        handle: projects_cta_title_line_one_text_style
        field:
          type: text_style
          display: 'CTA Title Line One Style'
      -
        handle: projects_cta_title_line_two
        field:
          type: text
          display: 'CTA Title Line Two'
      -
        handle: projects_cta_title_line_two_text_style
        field:
          type: text_style
          display: 'CTA Title Line Two Style'
      -
        handle: projects_cta_title_line_three
        field:
          type: text
          display: 'CTA Title Line Three'
      -
        handle: projects_cta_title_line_three_text_style
        field:
          type: text_style
          display: 'CTA Title Line Three Style'
      -
        handle: projects_cta_button_label
        field:
          type: text
          display: 'CTA Button Label'
      -
        handle: projects_cta_button_label_text_style
        field:
          type: text_style
          display: 'CTA Button Label Style'
      -
        handle: projects_cta_button_href
        field:
          type: text
          display: 'CTA Button URL'
  seo:
    display: SEO
    fields:
      -
        import: seo
