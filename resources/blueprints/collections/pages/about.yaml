title: 'About Page'
sections:
  hero:
    display: Hero
    fields:
      -
        handle: title
        field:
          type: text
          display: 'Page Title'
          required: true
      -
        handle: title_text_style
        field:
          type: text_style
          display: 'Page Title Text Controls'
          instructions: 'Use the plus and minus buttons to adjust this text. Reset returns it to the original design.'
      -
        handle: about_hero_eyebrow
        field:
          type: text
          display: Eyebrow
      -
        handle: about_hero_eyebrow_text_style
        field:
          type: text_style
          display: 'Eyebrow Text Controls'
          instructions: 'Use the plus and minus buttons to adjust this text. Reset returns it to the original design.'
      -
        handle: about_hero_title_line_one
        field:
          type: text
          display: 'Title Line One'
      -
        handle: about_hero_title_line_one_text_style
        field:
          type: text_style
          display: 'Title Line One Text Controls'
          instructions: 'Use the plus and minus buttons to adjust this text. Reset returns it to the original design.'
      -
        handle: about_hero_accent_word
        field:
          type: text
          display: 'Accent Word'
      -
        handle: about_hero_accent_word_text_style
        field:
          type: text_style
          display: 'Accent Word Text Controls'
          instructions: 'Use the plus and minus buttons to adjust this text. Reset returns it to the original design.'
      -
        handle: about_hero_background_image
        field:
          type: assets
          display: 'Background Image'
          container: assets
          max_files: 1
      -
        handle: about_hero_background_alt
        field:
          type: text
          display: 'Background Image Alt'
  story:
    display: Story
    fields:
      -
        handle: about_story_eyebrow
        field:
          type: text
          display: Eyebrow
      -
        handle: about_story_eyebrow_text_style
        field:
          type: text_style
