          instructions: 'Use the plus and minus buttons to adjust this text. Reset returns it to the original design.'
      -
        handle: about_story_heading_line_one
        field:
          type: text
          display: 'Heading Line One'
      -
        handle: about_story_heading_line_one_text_style
        field:
          type: text_style
          display: 'Heading Line One Text Controls'
