title: 'About Page'
sections:
  hero:
    display: Hero
    fields:
      -
        handle: title
        field:
          type: text
          display: 'Page Title'
          required: true
      -
        handle: title_text_style
        field:
          type: text_style
          display: 'Page Title Style'
      -
        handle: about_hero_eyebrow
        field:
          type: text
          display: Eyebrow
      -
        handle: about_hero_eyebrow_text_style
        field:
          type: text_style
          display: 'Eyebrow Style'
      -
        handle: about_hero_title_line_one
        field:
          type: text
          display: 'Title Line One'
      -
        handle: about_hero_title_line_one_text_style
        field:
          type: text_style
          display: 'Title Line One Style'
      -
        handle: about_hero_accent_word
        field:
          type: text
          display: 'Accent Word'
      -
        handle: about_hero_accent_word_text_style
        field:
          type: text_style
          display: 'Accent Word Style'
      -
        handle: about_hero_background_image
        field:
          type: assets
          display: 'Background Image'
          container: assets
          max_files: 1
      -
        handle: about_hero_background_alt
        field:
          type: text
          display: 'Background Image Alt'
  story:
    display: Story
    fields:
      -
        handle: about_story_eyebrow
        field:
          type: text
          display: Eyebrow
      -
        handle: about_story_eyebrow_text_style
        field:
          type: text_style
          display: 'Eyebrow Style'
      -
        handle: about_story_heading_line_one
        field:
          type: text
          display: 'Heading Line One'
      -
        handle: about_story_heading_line_one_text_style
        field:
          type: text_style
          display: 'Heading Line One Style'
      -
        handle: about_story_heading_line_two
        field:
          type: text
          display: 'Heading Line Two'
      -
        handle: about_story_heading_line_two_text_style
        field:
          type: text_style
          display: 'Heading Line Two Style'
      -
        handle: about_story_heading_line_three
        field:
          type: text
          display: 'Heading Line Three'
      -
        handle: about_story_heading_line_three_text_style
        field:
          type: text_style
          display: 'Heading Line Three Style'
      -
        handle: about_story_body
        field:
          type: textarea
          display: Body
      -
        handle: about_story_body_text_style
        field:
          type: text_style
          display: 'Body Style'
      -
        handle: about_story_tall_image
        field:
          type: assets
          display: 'Tall Image'
          container: assets
          max_files: 1
      -
        handle: about_story_tall_image_alt
        field:
          type: text
          display: 'Tall Image Alt'
      -
        handle: about_story_square_image
        field:
          type: assets
          display: 'Square Image'
          container: assets
          max_files: 1
      -
        handle: about_story_square_image_alt
        field:
          type: text
          display: 'Square Image Alt'
  milestones:
    display: Milestones
    fields:
      -
        handle: about_milestones_title
        field:
          type: text
          display: Title
      -
        handle: about_milestones_title_text_style
        field:
          type: text_style
          display: 'Title Style'
      -
        handle: about_milestones_description
        field:
          type: textarea
          display: Description
      -
        handle: about_milestones_description_text_style
        field:
          type: text_style
          display: 'Description Style'
      -
        handle: about_milestones_items
        field:
          type: grid
          display: 'Milestone Items'
          mode: stacked
          fullscreen: true
          add_row: 'Add Milestone'
          fields:
            -
              handle: value
              field:
                type: text
                display: Value
                width: 33
            -
              handle: label
              field:
                type: text
                display: Label
                width: 33
            -
              handle: description
              field:
                type: textarea
                display: Description
                width: 50
            -
              handle: highlighted
              field:
                type: toggle
                display: Highlighted
                width: 33
  values:
    display: Values
    fields:
      -
        handle: about_values_title
        field:
          type: text
          display: Title
      -
        handle: about_values_title_text_style
        field:
          type: text_style
          display: 'Title Style'
      -
        handle: about_values_items
        field:
          type: grid
          display: 'Value Items'
          mode: stacked
          fullscreen: true
          add_row: 'Add Value'
          fields:
            -
              handle: number
              field:
                type: text
                display: Number
                width: 25
            -
              handle: title
              field:
                type: text
                display: Title
                width: 50
            -
              handle: description
              field:
                type: textarea
                display: Description
                width: 100
  cta:
    display: 'Final CTA'
    fields:
      -
        handle: about_cta_title
        field:
          type: text
          display: Title
      -
        handle: about_cta_title_text_style
        field:
          type: text_style
          display: 'Title Style'
      -
        handle: about_cta_button_label
        field:
          type: text
          display: 'Button Label'
      -
        handle: about_cta_button_label_text_style
        field:
          type: text_style
          display: 'Button Label Style'
      -
        handle: about_cta_button_href
        field:
          type: text
          display: 'Button URL'
      -
        handle: about_cta_background_image
        field:
          type: assets
          display: 'Background Image'
          container: assets
          max_files: 1
      -
        handle: about_cta_background_alt
        field:
          type: text
          display: 'Background Image Alt'
  seo:
    display: SEO
    fields:
      -
        import: seo
