          instructions: 'Use the plus and minus buttons to adjust this text. Reset returns it to the original design.'
      -
        handle: about_story_heading_line_three
        field:
          type: text
          display: 'Heading Line Three'
      -
        handle: about_story_heading_line_three_text_style
        field:
          type: text_style
          display: 'Heading Line Three Text Controls'
