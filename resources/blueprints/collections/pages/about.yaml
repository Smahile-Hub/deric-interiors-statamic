                display: Number
            -
              handle: number_text_style
              field:
                type: text_style
                display: 'Number Text Controls'
                instructions: 'Use the plus and minus buttons to adjust this text. Reset returns it to the original design.'
            -
              handle: title
              field:
                type: text
                display: Title
            -
              handle: title_text_style
              field:
                type: text_style
                display: 'Title Text Controls'
                instructions: 'Use the plus and minus buttons to adjust this text. Reset returns it to the original design.'
            -
              handle: description
              field:
                type: textarea
                display: Description
            -
              handle: description_text_style
              field:
