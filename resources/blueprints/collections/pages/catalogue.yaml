title: 'Catalogue Page'
sections:
  hero:
    display: Hero
    fields:
      -
        handle: title
        field:
          type: text
          display: 'Page Title'
          required: true
      -
        handle: title_text_style
        field:
          type: text_style
          display: 'Page Title Style'
      -
        handle: hero_eyebrow
        field:
          type: text
          display: Eyebrow
      -
        handle: hero_eyebrow_text_style
        field:
          type: text_style
          display: 'Eyebrow Style'
      -
        handle: hero_title_line_one
        field:
          type: text
          display: 'Title Line One'
      -
        handle: hero_title_line_one_text_style
        field:
          type: text_style
          display: 'Title Line One Style'
      -
        handle: hero_title_line_two
        field:
          type: text
          display: 'Title Line Two (Italic/Accent)'
      -
        handle: hero_title_line_two_text_style
        field:
          type: text_style
          display: 'Title Line Two (Italic/Accent) Style'
      -
        handle: hero_description
        field:
          type: textarea
          display: Description
      -
        handle: hero_description_text_style
        field:
          type: text_style
          display: 'Description Style'
      -
        handle: hero_background_image
        field:
          type: assets
          display: 'Background Image'
          container: assets
          max_files: 1
      -
        handle: hero_background_alt
        field:
          type: text
          display: 'Background Image Alt'
  intro:
    display: Intro
    fields:
      -
        handle: intro_title
        field:
          type: text
          display: Title
      -
        handle: intro_title_text_style
        field:
          type: text_style
          display: 'Title Style'
      -
        handle: intro_description
        field:
          type: textarea
          display: Description
      -
        handle: intro_description_text_style
        field:
          type: text_style
          display: 'Description Style'
  catalogs:
    display: 'Catalogue Items'
    fields:
      -
        handle: catalog_items
        field:
          type: grid
          display: Catalogues
          mode: stacked
          fullscreen: true
          add_row: 'Add Catalogue'
          fields:
            -
              handle: title
              field:
                type: text
                display: Title
                width: 50
            -
              handle: description
              field:
                type: textarea
                display: Description
                width: 50
            -
              handle: badge
              field:
                type: text
                display: 'Badge (e.g. New)'
                width: 50
            -
              handle: cover_image
              field:
                type: assets
                display: 'Cover Image'
                container: assets
                max_files: 1
                width: 50
            -
              handle: cover_image_alt
              field:
                type: text
                display: 'Cover Image Alt'
                width: 50
            -
              handle: file_url
              field:
                type: text
                display: 'PDF / File URL'
                width: 50
            -
              handle: file_label
              field:
                type: text
                display: 'Download Button Label'
                width: 50
  cta:
    display: 'Final CTA'
    fields:
      -
        handle: cta_title
        field:
          type: text
          display: Title
      -
        handle: cta_title_text_style
        field:
          type: text_style
          display: 'Title Style'
      -
        handle: cta_description
        field:
          type: textarea
          display: Description
      -
        handle: cta_description_text_style
        field:
          type: text_style
          display: 'Description Style'
      -
        handle: cta_button_label
        field:
          type: text
          display: 'Button Label'
      -
        handle: cta_button_label_text_style
        field:
          type: text_style
          display: 'Button Label Style'
      -
        handle: cta_button_href
        field:
          type: text
          display: 'Button URL'
  seo:
    display: SEO
    fields:
      -
        import: seo
