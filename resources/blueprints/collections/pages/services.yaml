                      instructions: 'Use the plus and minus buttons to adjust this text. Reset returns it to the original design.'
                  -
                    handle: image
                    field:
                      type: assets
                      display: Image
                      container: assets
                      max_files: 1
                  -
                    handle: image_alt
                    field:
                      type: text
                      display: 'Image Alt'
                  -
                    handle: wide
                    field:
                      type: toggle
                      display: 'Wide Card'
                  -
                    handle: link_label
                    field:
                      type: text
                      display: 'Link Label'
                  -
                    handle: link_label_text_style
                    field:
