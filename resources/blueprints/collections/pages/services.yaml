title: 'Services Page'
sections:
  hero:
    display: Hero
    fields:
      -
        handle: title
        field:
          type: text
          display: 'Page Title'
          required: true
      -
        handle: title_text_style
        field:
          type: text_style
          display: 'Page Title Text Controls'
          instructions: 'Use the plus and minus buttons to adjust this text. Reset returns it to the original design.'
      -
        handle: services_hero_eyebrow
        field:
          type: text
          display: Eyebrow
      -
        handle: services_hero_eyebrow_text_style
        field:
          type: text_style
          display: 'Eyebrow Text Controls'
          instructions: 'Use the plus and minus buttons to adjust this text. Reset returns it to the original design.'
      -
        handle: services_hero_title_prefix
        field:
          type: text
          display: 'Title Prefix'
      -
        handle: services_hero_title_prefix_text_style
        field:
          type: text_style
          display: 'Title Prefix Text Controls'
          instructions: 'Use the plus and minus buttons to adjust this text. Reset returns it to the original design.'
      -
        handle: services_hero_title_accent
        field:
          type: text
          display: 'Title Accent'
      -
        handle: services_hero_title_accent_text_style
        field:
          type: text_style
          display: 'Title Accent Text Controls'
          instructions: 'Use the plus and minus buttons to adjust this text. Reset returns it to the original design.'
      -
        handle: services_hero_title_suffix
        field:
          type: text
          display: 'Title Suffix'
      -
        handle: services_hero_title_suffix_text_style
        field:
          type: text_style
          display: 'Title Suffix Text Controls'
          instructions: 'Use the plus and minus buttons to adjust this text. Reset returns it to the original design.'
      -
        handle: services_hero_description
        field:
          type: textarea
          display: Description
      -
        handle: services_hero_description_text_style
        field:
          type: text_style
          display: 'Description Text Controls'
          instructions: 'Use the plus and minus buttons to adjust this text. Reset returns it to the original design.'
      -
        handle: services_hero_background_image
        field:
          type: assets
          display: 'Background Image'
          container: assets
          max_files: 1
      -
        handle: services_hero_background_alt
        field:
          type: text
          display: 'Background Image Alt'
      -
        handle: services_hero_cta_label
        field:
          type: text
          display: 'Hero CTA Label'
      -
        handle: services_hero_cta_label_text_style
        field:
          type: text_style
          display: 'Hero CTA Label Text Controls'
          instructions: 'Use the plus and minus buttons to adjust this text. Reset returns it to the original design.'
      -
        handle: services_hero_cta_href
        field:
          type: text
          display: 'Hero CTA URL'
  stats:
    display: Stats
    fields:
      -
        handle: services_stats
        field:
          type: grid
          display: Stats
          add_row: 'Add Stat'
          fields:
            -
              handle: value
              field:
                type: text
                display: Value
            -
              handle: value_text_style
              field:
                type: text_style
                display: 'Value Text Controls'
                instructions: 'Use the plus and minus buttons to adjust this text. Reset returns it to the original design.'
            -
              handle: label
              field:
