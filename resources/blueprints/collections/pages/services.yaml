title: Services Page
sections:
  hero:
    display: Hero
    fields:
      -
        handle: services_hero_eyebrow
        field: { type: text, display: Eyebrow }
      -
        handle: services_hero_title_prefix
        field: { type: text, display: "Title Prefix" }
      -
        handle: services_hero_title_accent
        field: { type: text, display: "Title Accent" }
      -
        handle: services_hero_title_suffix
        field: { type: text, display: "Title Suffix" }
      -
        handle: services_hero_description
        field: { type: textarea, display: Description }
      -
        handle: services_hero_background_image
        field: { type: text, display: "Background Image URL" }
      -
        handle: services_hero_background_alt
        field: { type: text, display: "Background Image Alt" }
      -
        handle: services_hero_cta_label
        field: { type: text, display: "Hero CTA Label" }
      -
        handle: services_hero_cta_href
        field: { type: text, display: "Hero CTA URL" }
  stats:
    display: Stats
    fields:
      -
        handle: services_stats
        field:
          type: grid
          display: Stats
          add_row: Add Stat
          fields:
            -
              handle: value
              field: { type: text, display: Value }
            -
              handle: label
              field: { type: text, display: Label }
  intro:
    display: Intro
    fields:
      -
        handle: services_intro_title
        field: { type: text, display: Title }
      -
        handle: services_intro_description
        field: { type: textarea, display: Description }
  services:
    display: Service Rows
    fields:
      -
        handle: service_rows
        field:
          type: grid
          display: Rows
          add_row: Add Row
          fields:
            -
              handle: services_cards
              field:
                type: grid
                display: Cards
                add_row: Add Card
                fields:
                  -
                    handle: id
                    field: { type: text, display: ID }
                  -
                    handle: number
                    field: { type: text, display: Number }
                  -
                    handle: title
                    field: { type: text, display: Title }
                  -
                    handle: description
                    field: { type: textarea, display: Description }
                  -
                    handle: image
                    field: { type: text, display: "Image URL" }
                  -
                    handle: image_alt
                    field: { type: text, display: "Image Alt" }
                  -
                    handle: wide
                    field: { type: toggle, display: "Wide Card" }
                  -
                    handle: link_label
                    field: { type: text, display: "Link Label" }
                  -
                    handle: link_href
                    field: { type: text, display: "Link URL" }
  process:
    display: Process
    fields:
      -
        handle: services_process_title
        field: { type: text, display: Title }
      -
        handle: services_process_items
        field:
          type: grid
          display: Process Items
          add_row: Add Step
          fields:
            -
              handle: number
              field: { type: text, display: Number }
            -
              handle: title
              field: { type: text, display: Title }
            -
              handle: description
              field: { type: textarea, display: Description }
  cta:
    display: Final CTA
    fields:
      -
        handle: services_cta_title_line_one
        field: { type: text, display: "CTA Title Line One" }
      -
        handle: services_cta_title_line_two
        field: { type: text, display: "CTA Title Line Two" }
      -
        handle: services_cta_description
        field: { type: textarea, display: Description }
      -
        handle: services_cta_primary_label
        field: { type: text, display: "Primary Label" }
      -
        handle: services_cta_primary_href
        field: { type: text, display: "Primary URL" }
      -
        handle: services_cta_secondary_label
        field: { type: text, display: "Secondary Label" }
      -
        handle: services_cta_secondary_href
        field: { type: text, display: "Secondary URL" }
