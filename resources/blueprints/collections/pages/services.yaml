          type: grid
          display: Rows
          add_row: 'Add Row'
          fields:
            -
              handle: services_cards
              field:
                type: grid
                display: Cards
                add_row: 'Add Card'
                fields:
                  -
                    handle: id
                    field:
                      type: text
                      display: ID
                  -
                    handle: id_text_style
                    field:
                      type: text_style
                      display: 'ID Text Controls'
                      instructions: 'Use the plus and minus buttons to adjust this text. Reset returns it to the original design.'
                  -
                    handle: number
                    field:
                      type: text
