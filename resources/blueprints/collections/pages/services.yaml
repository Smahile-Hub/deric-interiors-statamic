title: 'Services Page'
sections:
  hero:
    display: Hero
    fields:
      -
        handle: title
        field:
          type: text
          display: 'Page Title'
          required: true
      -
        handle: title_text_style
        field:
          type: text_style
          display: 'Page Title Style'
      -
        handle: services_hero_eyebrow
        field:
          type: text
          display: Eyebrow
      -
        handle: services_hero_eyebrow_text_style
        field:
          type: text_style
          display: 'Eyebrow Style'
      -
        handle: services_hero_title_prefix
        field:
          type: text
          display: 'Title Prefix'
      -
        handle: services_hero_title_prefix_text_style
        field:
          type: text_style
          display: 'Title Prefix Style'
      -
        handle: services_hero_title_accent
        field:
          type: text
          display: 'Title Accent'
      -
        handle: services_hero_title_accent_text_style
        field:
          type: text_style
          display: 'Title Accent Style'
      -
        handle: services_hero_title_suffix
        field:
          type: text
          display: 'Title Suffix'
      -
        handle: services_hero_title_suffix_text_style
        field:
          type: text_style
          display: 'Title Suffix Style'
      -
        handle: services_hero_description
        field:
          type: textarea
          display: Description
      -
        handle: services_hero_description_text_style
        field:
          type: text_style
          display: 'Description Style'
      -
        handle: services_hero_background_image
        field:
          type: assets
          display: 'Background Image'
          container: assets
          max_files: 1
      -
        handle: services_hero_background_alt
        field:
          type: text
          display: 'Background Image Alt'
      -
        handle: services_hero_cta_label
        field:
          type: text
          display: 'Hero CTA Label'
      -
        handle: services_hero_cta_label_text_style
        field:
          type: text_style
          display: 'Hero CTA Label Style'
      -
        handle: services_hero_cta_href
        field:
          type: text
          display: 'Hero CTA URL'
  stats:
    display: Stats
    fields:
      -
        handle: services_stats
        field:
          type: grid
          display: Stats
          add_row: 'Add Stat'
          fields:
            -
              handle: value
              field:
                type: text
                display: Value
                width: 50
            -
              handle: label
              field:
                type: text
                display: Label
                width: 50
  intro:
    display: Intro
    fields:
      -
        handle: services_intro_title
        field:
          type: text
          display: Title
      -
        handle: services_intro_title_text_style
        field:
          type: text_style
          display: 'Title Style'
      -
        handle: services_intro_description
        field:
          type: textarea
          display: Description
      -
        handle: services_intro_description_text_style
        field:
          type: text_style
          display: 'Description Style'
  services:
    display: 'Service Rows'
    fields:
      -
        handle: service_rows
        field:
          type: grid
          display: Rows
          mode: stacked
          fullscreen: true
          add_row: 'Add Row'
          fields:
            -
              handle: services_cards
              field:
                type: grid
                display: Cards
                mode: stacked
                fullscreen: true
                add_row: 'Add Card'
                fields:
                  -
                    handle: id
                    field:
                      type: text
                      display: ID
                      width: 25
                  -
                    handle: number
                    field:
                      type: text
                      display: Number
                      width: 25
                  -
                    handle: title
                    field:
                      type: text
                      display: Title
                      width: 50
                  -
                    handle: description
                    field:
                      type: textarea
                      display: Description
                      width: 100
                  -
                    handle: image
                    field:
                      type: assets
                      display: Image
                      container: assets
                      max_files: 1
                      width: 50
                  -
                    handle: image_alt
                    field:
                      type: text
                      display: 'Image Alt'
                      width: 50
                  -
                    handle: wide
                    field:
                      type: toggle
                      display: 'Wide Card'
                      width: 33
                  -
                    handle: link_label
                    field:
                      type: text
                      display: 'Link Label'
                      width: 33
                  -
                    handle: link_href
                    field:
                      type: text
                      display: 'Link URL'
                      width: 33
  process:
    display: Process
    fields:
      -
        handle: services_process_title
        field:
          type: text
          display: Title
      -
        handle: services_process_title_text_style
        field:
          type: text_style
          display: 'Title Style'
      -
        handle: services_process_items
        field:
          type: grid
          display: 'Process Items'
          mode: stacked
          fullscreen: true
          add_row: 'Add Step'
          fields:
            -
              handle: number
              field:
                type: text
                display: Number
                width: 25
            -
              handle: title
              field:
                type: text
                display: Title
                width: 50
            -
              handle: description
              field:
                type: textarea
                display: Description
                width: 100
  cta:
    display: 'Final CTA'
    fields:
      -
        handle: services_cta_title_line_one
        field:
          type: text
          display: 'CTA Title Line One'
      -
        handle: services_cta_title_line_one_text_style
        field:
          type: text_style
          display: 'CTA Title Line One Style'
      -
        handle: services_cta_title_line_two
        field:
          type: text
          display: 'CTA Title Line Two'
      -
        handle: services_cta_title_line_two_text_style
        field:
          type: text_style
          display: 'CTA Title Line Two Style'
      -
        handle: services_cta_description
        field:
          type: textarea
          display: Description
      -
        handle: services_cta_description_text_style
        field:
          type: text_style
          display: 'Description Style'
      -
        handle: services_cta_primary_label
        field:
          type: text
          display: 'Primary Label'
      -
        handle: services_cta_primary_label_text_style
        field:
          type: text_style
          display: 'Primary Label Style'
      -
        handle: services_cta_primary_href
        field:
          type: text
          display: 'Primary URL'
      -
        handle: services_cta_secondary_label
        field:
          type: text
          display: 'Secondary Label'
      -
        handle: services_cta_secondary_label_text_style
        field:
          type: text_style
          display: 'Secondary Label Style'
      -
        handle: services_cta_secondary_href
        field:
          type: text
          display: 'Secondary URL'
  seo:
    display: SEO
    fields:
      -
        import: seo
