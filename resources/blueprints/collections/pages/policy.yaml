title: 'Policy Page'
sections:
  main:
    display: 'Page Settings'
    fields:
      -
        handle: title
        field:
          type: text
          display: Title
          required: true
      -
        handle: title_text_style
        field:
          type: text_style
          display: 'Title Style'
      -
        handle: policy_layout
        field:
          type: select
          display: 'Policy Layout'
          default: privacy
          options:
            privacy: 'Privacy Policy'
            return: 'Return and Refund Policy'
  privacy:
    display: 'Privacy Policy Layout'
    fields:
      -
        handle: privacy_eyebrow
        field:
          type: text
          display: Eyebrow
      -
        handle: privacy_eyebrow_text_style
        field:
          type: text_style
          display: 'Eyebrow Style'
      -
        handle: privacy_valid_label
        field:
          type: text
          display: 'Validity Label'
      -
        handle: privacy_intro_paragraphs
        field:
          type: list
          display: 'Intro Paragraphs'
      -
        handle: privacy_sections
        field:
          type: grid
          display: 'Privacy Sections'
          mode: stacked
          fullscreen: true
          add_row: 'Add Section'
          fields:
            -
              handle: id
              field:
                type: text
                display: ID
                width: 25
            -
              handle: section_title
              field:
                type: text
                display: Title
                width: 50
            -
              handle: paragraphs
              field:
                type: list
                display: Paragraphs
                width: 100
            -
              handle: bullets
              field:
                type: list
                display: Bullets
                width: 100
      -
        handle: privacy_image_break_image
        field:
          type: assets
          display: 'Image Break Image'
          container: assets
          max_files: 1
      -
        handle: privacy_image_break_alt
        field:
          type: text
          display: 'Image Break Alt'
      -
        handle: privacy_image_break_quote
        field:
          type: textarea
          display: 'Image Break Quote'
      -
        handle: privacy_contact_eyebrow
        field:
          type: text
          display: 'Contact Eyebrow'
      -
        handle: privacy_contact_eyebrow_text_style
        field:
          type: text_style
          display: 'Contact Eyebrow Style'
      -
        handle: privacy_contact_email
        field:
          type: text
          display: 'Contact Email'
  return_policy:
    display: 'Return and Refund Layout'
    fields:
      -
        handle: return_hero_eyebrow
        field:
          type: text
          display: 'Hero Eyebrow'
      -
        handle: return_hero_eyebrow_text_style
        field:
          type: text_style
          display: 'Hero Eyebrow Style'
      -
        handle: return_title_line_one
        field:
          type: text
          display: 'Title Line One'
      -
        handle: return_title_line_one_text_style
        field:
          type: text_style
          display: 'Title Line One Style'
      -
        handle: return_title_line_two
        field:
          type: text
          display: 'Title Line Two'
      -
        handle: return_title_line_two_text_style
        field:
          type: text_style
          display: 'Title Line Two Style'
      -
        handle: return_title_line_three
        field:
          type: text
          display: 'Title Line Three'
      -
        handle: return_title_line_three_text_style
        field:
          type: text_style
          display: 'Title Line Three Style'
      -
        handle: return_hero_quote
        field:
          type: textarea
          display: 'Hero Quote'
      -
        handle: return_hero_quote_text_style
        field:
          type: text_style
          display: 'Hero Quote Style'
      -
        handle: return_hero_image
        field:
          type: assets
          display: 'Hero Image'
          container: assets
          max_files: 1
      -
        handle: return_hero_image_alt
        field:
          type: text
          display: 'Hero Image Alt'
      -
        handle: return_policy_sections
        field:
          type: grid
          display: 'Policy Cards'
          mode: stacked
          fullscreen: true
          add_row: 'Add Card'
          fields:
            -
              handle: id
              field:
                type: text
                display: ID
                width: 25
            -
              handle: section_title
              field:
                type: text
                display: Title
                width: 50
            -
              handle: icon
              field:
                type: select
                display: Icon
                width: 25
                options:
                  package: Package
                  alert-circle: Alert
                  refresh-cw: Refresh
                  message-square: Message
            -
              handle: paragraphs
              field:
                type: list
                display: Paragraphs
                width: 100
            -
              handle: highlight
              field:
                type: text
                display: 'Highlighted Phrase'
                width: 50
            -
              handle: protocol_title
              field:
                type: text
                display: 'Protocol Title'
                width: 50
            -
              handle: protocol_body
              field:
                type: textarea
                display: 'Protocol Body'
                width: 100
            -
              handle: support_label
              field:
                type: text
                display: 'Support Label'
                width: 33
            -
              handle: support_value
              field:
                type: text
                display: 'Support Value'
                width: 33
            -
              handle: support_href
              field:
                type: text
                display: 'Support URL'
                width: 33
      -
        handle: return_standard_title
        field:
          type: text
          display: 'Standard Title'
      -
        handle: return_standard_title_text_style
        field:
          type: text_style
          display: 'Standard Title Style'
      -
        handle: return_standard_copy
        field:
          type: textarea
          display: 'Standard Copy'
      -
        handle: return_standard_copy_text_style
        field:
          type: text_style
          display: 'Standard Copy Style'
  seo:
    display: SEO
    fields:
      -
        import: seo
