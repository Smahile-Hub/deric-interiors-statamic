title: 'Policy Page'
sections:
  main:
    display: 'Page Settings'
    fields:
      -
        handle: title
        field:
          type: text
          display: Title
          required: true
      -
        handle: title_text_style
        field:
          type: text_style
          display: 'Title Text Controls'
          instructions: 'Use the plus and minus buttons to adjust this text. Reset returns it to the original design.'
      -
        handle: policy_layout
        field:
          type: select
          display: 'Policy Layout'
          default: privacy
          options:
            privacy: 'Privacy Policy'
            return: 'Return and Refund Policy'
  privacy:
    display: 'Privacy Policy Layout'
    fields:
      -
        handle: privacy_eyebrow
        field:
          type: text
          display: Eyebrow
      -
        handle: privacy_eyebrow_text_style
