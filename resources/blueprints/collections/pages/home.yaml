title: 'Home Page'
sections:
  hero:
    display: Hero
    fields:
      -
        handle: title
        field:
          type: text
          display: 'Page Title'
          required: true
      -
        handle: title_text_style
        field:
          type: text_style
          display: 'Page Title Text Controls'
          instructions: 'Use the plus and minus buttons to adjust this text. Reset returns it to the original design.'
      -
        handle: hero_eyebrow
        field:
          type: text
          display: Eyebrow
      -
        handle: hero_eyebrow_text_style
        field:
          type: text_style
          display: 'Eyebrow Text Controls'
          instructions: 'Use the plus and minus buttons to adjust this text. Reset returns it to the original design.'
      -
        handle: hero_heading_lines
        field:
          type: grid
          display: 'Heading Lines'
          add_row: 'Add Line'
          fields:
            -
              handle: line
              field:
                type: text
                display: Line
            -
              handle: line_text_style
              field:
                type: text_style
                display: 'Line Text Controls'
                instructions: 'Use the plus and minus buttons to adjust this text. Reset returns it to the original design.'
      -
        handle: hero_subtext
        field:
          type: textarea
          display: Subtext
      -
        handle: hero_subtext_text_style
        field:
          type: text_style
          display: 'Subtext Text Controls'
          instructions: 'Use the plus and minus buttons to adjust this text. Reset returns it to the original design.'
      -
        handle: hero_cta_label
        field:
          type: text
          display: 'Primary Button Label'
      -
        handle: hero_cta_label_text_style
        field:
          type: text_style
          display: 'Primary Button Label Text Controls'
          instructions: 'Use the plus and minus buttons to adjust this text. Reset returns it to the original design.'
      -
        handle: hero_cta_href
        field:
