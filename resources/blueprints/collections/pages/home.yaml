title: 'Home Page'
sections:
  hero:
    display: Hero
    fields:
      -
        handle: title
        field:
          type: text
          display: 'Page Title'
          required: true
      -
        handle: title_text_style
        field:
          type: text_style
          display: 'Page Title Style'
      -
        handle: hero_eyebrow
        field:
          type: text
          display: Eyebrow
      -
        handle: hero_eyebrow_text_style
        field:
          type: text_style
          display: 'Eyebrow Style'
      -
        handle: hero_heading_lines
        field:
          type: grid
          display: 'Heading Lines'
          add_row: 'Add Line'
          fields:
            -
              handle: line
              field:
                type: text
                display: Line
      -
        handle: hero_subtext
        field:
          type: textarea
          display: Subtext
      -
        handle: hero_subtext_text_style
        field:
          type: text_style
          display: 'Subtext Style'
      -
        handle: hero_cta_label
        field:
          type: text
          display: 'Primary Button Label'
      -
        handle: hero_cta_label_text_style
        field:
          type: text_style
          display: 'Primary Button Label Style'
      -
        handle: hero_cta_href
        field:
          type: text
          display: 'Primary Button URL'
      -
        handle: hero_secondary_label
        field:
          type: text
          display: 'Secondary Link Label'
      -
        handle: hero_secondary_label_text_style
        field:
          type: text_style
          display: 'Secondary Link Label Style'
      -
        handle: hero_secondary_href
        field:
          type: text
          display: 'Secondary Link URL'
      -
        handle: hero_image
        field:
          type: assets
          display: 'Hero Image'
          container: assets
          max_files: 1
      -
        handle: hero_image_alt
        field:
          type: text
          display: 'Hero Image Alt'
      -
        import: hero_slider
      -
        handle: hero_overlay_start
        field:
          type: text
          display: 'Top Tint Colour'
          instructions: 'Sets the tint colour near the top of the hero photo. Leave this as it is unless you want to change the mood of the image.'
      -
        handle: hero_overlay_end
        field:
          type: text
          display: 'Bottom Tint Colour'
          instructions: 'Sets the tint colour near the bottom of the hero photo. Leave this as it is unless the image needs a warmer, cooler, lighter, or darker finish.'
  about:
