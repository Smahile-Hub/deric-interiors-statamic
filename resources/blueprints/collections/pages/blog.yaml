title: 'Blog Index Page'
sections:
  hero:
    display: Hero
    fields:
      -
        handle: title
        field:
          type: text
          display: 'Page Title'
          required: true
      -
        handle: title_text_style
        field:
          type: text_style
          display: 'Page Title Style'
      -
        handle: blog_hero_eyebrow
        field:
          type: text
          display: Eyebrow
      -
        handle: blog_hero_eyebrow_text_style
        field:
          type: text_style
          display: 'Eyebrow Style'
      -
        handle: blog_hero_title
        field:
          type: textarea
          display: Title
      -
        handle: blog_hero_title_text_style
        field:
          type: text_style
          display: 'Title Style'
      -
        handle: blog_hero_description
        field:
          type: textarea
          display: Description
      -
        handle: blog_hero_description_text_style
        field:
          type: text_style
          display: 'Description Style'
  seo:
    display: SEO
    fields:
      -
        import: seo
