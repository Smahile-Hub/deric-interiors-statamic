title: 'Testimonials Page'
sections:
  hero:
    display: Hero
    fields:
      -
        handle: title
        field:
          type: text
          display: 'Page Title'
          required: true
      -
        handle: title_text_style
        field:
          type: text_style
          display: 'Page Title Style'
      -
        handle: hero_heading
        field:
          type: text
          display: Heading
      -
        handle: hero_heading_text_style
        field:
          type: text_style
          display: 'Heading Style'
      -
        handle: hero_subtext
        field:
          type: textarea
          display: Subtext
      -
        handle: hero_subtext_text_style
        field:
          type: text_style
          display: 'Subtext Style'
  testimonials:
    display: Testimonials
    fields:
      -
        handle: testimonials_list
        field:
          type: grid
          display: Testimonials
          mode: stacked
          fullscreen: true
          add_row: 'Add Testimonial'
          fields:
            -
              handle: quote
              field:
                type: textarea
                display: Quote
                width: 100
            -
              handle: author
              field:
                type: text
                display: Author
                width: 50
            -
              handle: role
              field:
                type: text
                display: Role
                width: 50
            -
              handle: location
              field:
                type: text
                display: Location
                width: 50
            -
              handle: project
              field:
                type: text
                display: Project
                width: 50
  cta:
    display: 'Final CTA'
    fields:
      -
        handle: testimonials_cta_title
        field:
          type: text
          display: Title
      -
        handle: testimonials_cta_title_text_style
        field:
          type: text_style
          display: 'Title Style'
      -
        handle: testimonials_cta_description
        field:
          type: textarea
          display: Description
      -
        handle: testimonials_cta_description_text_style
        field:
          type: text_style
          display: 'Description Style'
      -
        handle: testimonials_cta_primary_label
        field:
          type: text
          display: 'Primary Label'
      -
        handle: testimonials_cta_primary_label_text_style
        field:
          type: text_style
          display: 'Primary Label Style'
      -
        handle: testimonials_cta_primary_href
        field:
          type: text
          display: 'Primary URL'
      -
        handle: testimonials_cta_secondary_label
        field:
          type: text
          display: 'Secondary Label'
      -
        handle: testimonials_cta_secondary_label_text_style
        field:
          type: text_style
          display: 'Secondary Label Style'
      -
        handle: testimonials_cta_secondary_href
        field:
          type: text
          display: 'Secondary URL'
  seo:
    display: SEO
    fields:
      -
        import: seo
