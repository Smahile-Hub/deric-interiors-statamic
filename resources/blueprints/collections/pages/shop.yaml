title: 'Shop Page'
sections:
  hero:
    display: Hero
    fields:
      -
        handle: hero_eyebrow
        field:
          type: text
          display: 'Eyebrow Label'
          instructions: 'Small text above the main heading (e.g. "Shop from us")'
      -
        handle: hero_heading
        field:
          type: text
          display: Heading
          required: true
      -
        handle: hero_heading_text_style
        field:
          type: text_style
          display: 'Heading Style'
      -
        handle: hero_subtext
        field:
          type: textarea
          display: Description
      -
        handle: hero_bg_image
        field:
          type: assets
          display: 'Background Image'
          container: assets
          max_files: 1
          instructions: 'Full-width background photo for the hero section.'
  intro:
    display: 'Intro Section'
    fields:
      -
        handle: intro_eyebrow
        field:
          type: text
          display: 'Eyebrow Label'
          instructions: 'Small text above the intro heading (e.g. "The Shop Edit")'
      -
        handle: intro_title
        field:
          type: text
          display: Heading
      -
        handle: intro_description
        field:
          type: textarea
          display: Description
  filters:
    display: 'Category Chips'
    fields:
      -
        handle: shop_filters
        field:
          type: list
          display: 'Filter Categories'
          instructions: 'These appear as pill chips in the intro section. Match your product category names exactly.'
  cta:
    display: 'Call to Action'
    fields:
      -
        handle: shop_cta_eyebrow
        field:
          type: text
          display: 'Eyebrow Label'
          instructions: 'Small text above the CTA heading (e.g. "Need Guidance?")'
      -
        handle: shop_cta_title
        field:
          type: text
          display: Heading
      -
        handle: shop_cta_title_text_style
        field:
          type: text_style
          display: 'Heading Style'
      -
        handle: shop_cta_description
        field:
          type: textarea
          display: Description
      -
        handle: shop_cta_button_label
        field:
          type: text
          display: 'Button Label'
      -
        handle: shop_cta_button_href
        field:
          type: text
          display: 'Button URL'
  seo:
    display: SEO
    fields:
      -
        import: seo
