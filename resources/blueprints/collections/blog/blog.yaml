title: 'Blog Post'
sections:
  main:
    display: Main
    fields:
      -
        handle: title
        field:
          type: text
          display: Title
          required: true
      -
        handle: title_text_style
        field:
          type: text_style
          display: 'Title Text Controls'
          instructions: 'Use the plus and minus buttons to adjust this text. Reset returns it to the original design.'
      -
        handle: category
        field:
          type: text
          display: Category
      -
        handle: category_text_style
        field:
          type: text_style
          display: 'Category Text Controls'
          instructions: 'Use the plus and minus buttons to adjust this text. Reset returns it to the original design.'
      -
        handle: excerpt
        field:
          type: textarea
          display: Excerpt
      -
        handle: excerpt_text_style
        field:
          type: text_style
          display: 'Excerpt Text Controls'
          instructions: 'Use the plus and minus buttons to adjust this text. Reset returns it to the original design.'
      -
        handle: content_blocks
        field:
          type: replicator
          display: 'Article Content'
          button_label: 'Add Block'
          sets:
            text_block:
              display: 'Paragraph / Text'
              fields:
                -
                  handle: text
                  field:
                    type: markdown
                    display: Content
                    buttons:
                      - bold
                      - italic
                      - unorderedlist
                      - orderedlist
                      - quote
                      - anchor
                      - h2
                      - h3
                -
                  handle: text_text_style
                  field:
                    type: text_style
                    display: 'Content Text Controls'
                    instructions: 'Use the plus and minus buttons to adjust this text. Reset returns it to the original design.'
            image_block:
              display: Image
              fields:
                -
                  handle: image
                  field:
                    type: assets
                    display: Image
                    container: assets
                    max_files: 1
                    required: true
                -
                  handle: caption
                  field:
                    type: text
                    display: 'Caption (optional)'
                -
                  handle: caption_text_style
                  field:
                    type: text_style
                    display: 'Caption (optional) Text Controls'
                    instructions: 'Use the plus and minus buttons to adjust this text. Reset returns it to the original design.'
      -
        handle: content
        field:
          type: markdown
          display: 'Article Body (Legacy)'
      -
        handle: content_text_style
        field:
          type: text_style
          display: 'Article Body (Legacy) Text Controls'
          instructions: 'Use the plus and minus buttons to adjust this text. Reset returns it to the original design.'
  details:
    display: Details
    fields:
      -
        handle: author
        field:
          type: text
          display: Author
      -
        handle: author_text_style
        field:
          type: text_style
          display: 'Author Text Controls'
          instructions: 'Use the plus and minus buttons to adjust this text. Reset returns it to the original design.'
      -
        handle: reading_minutes
        field:
          type: text
          display: 'Reading Time'
      -
        handle: reading_minutes_text_style
        field:
          type: text_style
          display: 'Reading Time Text Controls'
          instructions: 'Use the plus and minus buttons to adjust this text. Reset returns it to the original design.'
      -
        handle: cover_image_url
        field:
          type: assets
          display: 'Cover Image'
          container: assets
          max_files: 1
      -
        handle: cover_image_alt
        field:
          type: text
          display: 'Cover Image Alt'
  seo:
    display: SEO
    fields:
      -
        handle: seo_title
        field:
          type: text
          display: 'SEO Title'
      -
        handle: meta_description
        field:
          type: textarea
          display: 'Meta Description'
      -
        handle: seo_keywords
        field:
          type: list
          display: 'SEO Keywords'
      -
        handle: seo_image
        field:
          type: assets
          display: 'Social Share Image'
          container: assets
          max_files: 1
      -
        handle: seo_image_alt
        field:
          type: text
          display: 'Social Share Image Alt Text'
      -
        handle: canonical_url
        field:
          type: text
          display: 'Canonical URL'
      -
        handle: noindex
        field:
          type: toggle
          display: 'Hide From Search Engines'
