title: 'Site Settings'
sections:
  main:
    display: 'Site Settings'
    fields:
      -
        handle: site_title
        field:
          type: text
          display: 'Site Title'
          required: true
      -
        handle: site_title_text_style
        field:
          type: text_style
          display: 'Site Title Style'
      -
        handle: site_description
        field:
          type: textarea
          display: 'Site Description'
      -
        handle: site_description_text_style
        field:
          type: text_style
          display: 'Site Description Style'
      -
        handle: canonical_base_url
        field:
          type: text
          display: 'Canonical Site URL'
          instructions: 'Use the public canonical domain, for example https://dricinterior.com. No trailing slash.'
      -
        handle: site_url
        field:
          type: text
          display: 'Legacy Site URL'
          instructions: 'Kept for compatibility. Use the Canonical Site URL field above for SEO.'
      -
        handle: default_og_image
        field:
          type: assets
          display: 'Default Social Share Image'
          container: assets
          max_files: 1
      -
        handle: logo_url
        field:
          type: assets
          display: Logo
          container: assets
          max_files: 1
      -
        handle: logo_alt
        field:
          type: text
          display: 'Logo Alt Text'
      -
        handle: logo_width
        field:
          type: integer
          display: 'Logo Width'
      -
        handle: logo_height
        field:
          type: integer
          display: 'Logo Height'
      -
        handle: top_bar_email
        field:
          type: text
          display: 'Email (Top Bar)'
      -
        handle: top_bar_email_text_style
        field:
          type: text_style
          display: 'Email (Top Bar) Style'
      -
        handle: top_bar_phone
        field:
          type: text
          display: 'Phone (Top Bar)'
      -
        handle: top_bar_phone_text_style
        field:
          type: text_style
          display: 'Phone (Top Bar) Style'
      -
        handle: business_name
        field:
          type: text
          display: 'Business Name'
      -
        handle: business_name_text_style
        field:
          type: text_style
          display: 'Business Name Style'
      -
        handle: business_email
        field:
          type: text
          display: 'Business Email'
      -
        handle: business_email_text_style
        field:
          type: text_style
          display: 'Business Email Style'
      -
        handle: business_phone
        field:
          type: text
          display: 'Business Phone'
      -
        handle: business_phone_text_style
        field:
          type: text_style
          display: 'Business Phone Style'
      -
        handle: business_street_address
        field:
          type: text
          display: 'Business Street Address'
      -
        handle: business_street_address_text_style
        field:
          type: text_style
          display: 'Business Street Address Style'
      -
        handle: business_city
        field:
          type: text
          display: 'Business City'
      -
        handle: business_city_text_style
        field:
          type: text_style
          display: 'Business City Style'
      -
        handle: business_region
        field:
          type: text
          display: 'Business Region/State'
      -
        handle: business_region_text_style
        field:
          type: text_style
          display: 'Business Region/State Style'
      -
        handle: business_country
        field:
          type: text
          display: 'Business Country Code'
      -
        handle: business_country_text_style
        field:
          type: text_style
          display: 'Business Country Code Style'
      -
        handle: business_price_range
        field:
          type: text
          display: 'Business Price Range'
      -
        handle: business_price_range_text_style
        field:
          type: text_style
          display: 'Business Price Range Style'
      -
        handle: nav_items
        field:
          type: grid
          display: 'Header Navigation'
          mode: stacked
          fullscreen: true
          add_row: 'Add Nav Item'
          fields:
            -
              handle: label
              field:
                type: text
                display: Label
                width: 50
            -
              handle: label_text_style
              field:
                type: text_style
                display: 'Label Style'
                width: 50
            -
              handle: href
              field:
                type: text
                display: URL
                width: 50
      -
        handle: action_links
        field:
          type: grid
          display: 'Header Action Icons'
          mode: stacked
          fullscreen: true
          add_row: 'Add Action'
          instructions: 'Supported icons: aperture, grid, shopping-cart, shopping-bag, mail, phone. The shopping-bag icon opens the cart drawer like the Next.js site.'
          fields:
            -
              handle: label
              field:
                type: text
                display: Label
                width: 50
            -
              handle: label_text_style
              field:
                type: text_style
                display: 'Label Style'
                width: 50
            -
              handle: href
              field:
                type: text
                display: URL
                width: 50
            -
              handle: icon
              field:
                type: text
                display: Icon
                width: 50
      -
        handle: primary_cta_label
        field:
          type: text
          display: 'Header CTA Button Label'
      -
        handle: primary_cta_label_text_style
        field:
          type: text_style
          display: 'Header CTA Button Label Style'
      -
        handle: primary_cta_href
        field:
          type: text
          display: 'Header CTA Button Link'
      -
        handle: footer_blurb
        field:
          type: textarea
          display: 'Footer Description'
      -
        handle: footer_blurb_text_style
        field:
          type: text_style
          display: 'Footer Description Style'
      -
        handle: copyright_text
        field:
          type: text
          display: 'Copyright Text'
      -
        handle: copyright_text_text_style
        field:
          type: text_style
          display: 'Copyright Text Style'
      -
        handle: social_links
        field:
          type: grid
          display: 'Social Links'
          mode: stacked
          fullscreen: true
          fields:
            -
              handle: label
              field:
                type: text
                display: Label
                width: 50
            -
              handle: label_text_style
              field:
                type: text_style
                display: 'Label Style'
                width: 50
            -
              handle: icon
              field:
                type: text
                display: 'Icon (facebook/x-twitter/instagram/youtube/whatsapp)'
                width: 50
            -
              handle: href
              field:
                type: text
                display: URL
                width: 50
            -
              handle: target
              field:
                type: text
                display: Target
                default: _blank
                width: 50
      -
        handle: footer_columns
        field:
          type: grid
          display: 'Footer Columns'
          mode: stacked
          fullscreen: true
          fields:
            -
              handle: title
              field:
                type: text
                display: 'Column Title'
                width: 50
            -
              handle: title_text_style
              field:
                type: text_style
                display: 'Column Title Style'
                width: 50
            -
              handle: links
              field:
                type: grid
                display: Links
                mode: stacked
                fullscreen: true
                fields:
                  -
                    handle: label
                    field:
                      type: text
                      display: Label
                      width: 50
                  -
                    handle: label_text_style
                    field:
                      type: text_style
                      display: 'Label Style'
                      width: 50
                  -
                    handle: href
                    field:
                      type: text
                      display: URL
                      width: 50
