      -
        handle: business_price_range_text_style
        field:
          type: text_style
          display: 'Business Price Range Text Controls'
          instructions: 'Use the plus and minus buttons to adjust this text. Reset returns it to the original design.'
      -
        handle: nav_items
        field:
          type: grid
          display: 'Header Navigation'
          add_row: 'Add Nav Item'
          fields:
            -
              handle: label
              field:
                type: text
                display: Label
            -
              handle: label_text_style
              field:
                type: text_style
                display: 'Label Text Controls'
                instructions: 'Use the plus and minus buttons to adjust this text. Reset returns it to the original design.'
            -
              handle: href
              field:
                type: text
                display: URL
      -
        handle: action_links
        field:
          type: grid
          display: 'Header Action Icons'
          add_row: 'Add Action'
          instructions: 'Supported icons: aperture, grid, shopping-cart, shopping-bag, mail, phone. The shopping-bag icon opens the cart drawer like the Next.js site.'
          fields:
            -
              handle: label
              field:
                type: text
                display: Label
            -
              handle: label_text_style
              field:
                type: text_style
                display: 'Label Text Controls'
                instructions: 'Use the plus and minus buttons to adjust this text. Reset returns it to the original design.'
            -
              handle: href
              field:
                type: text
                display: URL
            -
              handle: icon
              field:
                type: text
                display: Icon
      -
        handle: primary_cta_label
        field:
          type: text
          display: 'Header CTA Button Label'
      -
        handle: primary_cta_label_text_style
        field:
          type: text_style
          display: 'Header CTA Button Label Text Controls'
          instructions: 'Use the plus and minus buttons to adjust this text. Reset returns it to the original design.'
      -
        handle: primary_cta_href
        field:
          type: text
          display: 'Header CTA Button Link'
      -
        handle: footer_blurb
        field:
          type: textarea
          display: 'Footer Description'
      -
        handle: footer_blurb_text_style
        field:
          type: text_style
          display: 'Footer Description Text Controls'
          instructions: 'Use the plus and minus buttons to adjust this text. Reset returns it to the original design.'
      -
        handle: copyright_text
        field:
          type: text
          display: 'Copyright Text'
      -
        handle: copyright_text_text_style
        field:
          type: text_style
          display: 'Copyright Text Text Controls'
          instructions: 'Use the plus and minus buttons to adjust this text. Reset returns it to the original design.'
      -
        handle: social_links
        field:
          type: grid
          display: 'Social Links'
          fields:
            -
              handle: label
              field:
                type: text
                display: Label
            -
              handle: label_text_style
              field:
                type: text_style
                display: 'Label Text Controls'
                instructions: 'Use the plus and minus buttons to adjust this text. Reset returns it to the original design.'
            -
              handle: icon
              field:
                type: text
                display: 'Icon (facebook/x-twitter/instagram/youtube/whatsapp)'
            -
              handle: href
              field:
                type: text
                display: URL
            -
              handle: target
              field:
                type: text
                display: Target
                default: _blank
      -
        handle: footer_columns
        field:
          type: grid
          display: 'Footer Columns'
          fields:
            -
              handle: title
              field:
                type: text
                display: 'Column Title'
            -
              handle: title_text_style
              field:
                type: text_style
                display: 'Column Title Text Controls'
                instructions: 'Use the plus and minus buttons to adjust this text. Reset returns it to the original design.'
            -
              handle: links
              field:
                type: grid
                display: Links
                fields:
                  -
                    handle: label
                    field:
                      type: text
                      display: Label
                  -
                    handle: label_text_style
                    field:
                      type: text_style
                      display: 'Label Text Controls'
                      instructions: 'Use the plus and minus buttons to adjust this text. Reset returns it to the original design.'
                  -
                    handle: href
                    field:
                      type: text
                      display: URL
