title: 'Site Settings'
sections:
  main:
    display: 'Site Settings'
    fields:
      -
        handle: site_title
        field:
          type: text
          display: 'Site Title'
          required: true
      -
        handle: site_title_text_style
        field:
          type: text_style
          display: 'Site Title Text Controls'
          instructions: 'Use the plus and minus buttons to adjust this text. Reset returns it to the original design.'
      -
        handle: site_description
        field:
          type: textarea
          display: 'Site Description'
      -
        handle: site_description_text_style
        field:
          type: text_style
          display: 'Site Description Text Controls'
          instructions: 'Use the plus and minus buttons to adjust this text. Reset returns it to the original design.'
      -
        handle: canonical_base_url
        field:
          type: text
          display: 'Canonical Site URL'
          instructions: 'Use the public canonical domain, for example https://dricinterior.com. No trailing slash.'
      -
        handle: site_url
        field:
          type: text
          display: 'Legacy Site URL'
          instructions: 'Kept for compatibility. Use the Canonical Site URL field above for SEO.'
      -
        handle: default_og_image
        field:
          type: assets
          display: 'Default Social Share Image'
          container: assets
          max_files: 1
      -
        handle: logo_url
        field:
          type: assets
          display: Logo
          container: assets
          max_files: 1
      -
        handle: logo_alt
        field:
          type: text
          display: 'Logo Alt Text'
      -
        handle: logo_width
        field:
          type: integer
          display: 'Logo Width'
      -
        handle: logo_height
        field:
          type: integer
          display: 'Logo Height'
      -
        handle: top_bar_email
        field:
          type: text
          display: 'Email (Top Bar)'
      -
        handle: top_bar_email_text_style
        field:
          type: text_style
          display: 'Email (Top Bar) Text Controls'
          instructions: 'Use the plus and minus buttons to adjust this text. Reset returns it to the original design.'
      -
        handle: top_bar_phone
        field:
          type: text
          display: 'Phone (Top Bar)'
      -
        handle: top_bar_phone_text_style
        field:
          type: text_style
          display: 'Phone (Top Bar) Text Controls'
          instructions: 'Use the plus and minus buttons to adjust this text. Reset returns it to the original design.'
      -
        handle: business_name
        field:
          type: text
          display: 'Business Name'
      -
        handle: business_name_text_style
        field:
          type: text_style
          display: 'Business Name Text Controls'
          instructions: 'Use the plus and minus buttons to adjust this text. Reset returns it to the original design.'
      -
        handle: business_email
        field:
          type: text
          display: 'Business Email'
      -
        handle: business_email_text_style
        field:
          type: text_style
          display: 'Business Email Text Controls'
          instructions: 'Use the plus and minus buttons to adjust this text. Reset returns it to the original design.'
      -
        handle: business_phone
        field:
          type: text
          display: 'Business Phone'
      -
        handle: business_phone_text_style
        field:
          type: text_style
          display: 'Business Phone Text Controls'
          instructions: 'Use the plus and minus buttons to adjust this text. Reset returns it to the original design.'
      -
        handle: business_street_address
        field:
          type: text
          display: 'Business Street Address'
      -
        handle: business_street_address_text_style
        field:
          type: text_style
          display: 'Business Street Address Text Controls'
          instructions: 'Use the plus and minus buttons to adjust this text. Reset returns it to the original design.'
      -
        handle: business_city
        field:
          type: text
          display: 'Business City'
      -
        handle: business_city_text_style
        field:
          type: text_style
          display: 'Business City Text Controls'
          instructions: 'Use the plus and minus buttons to adjust this text. Reset returns it to the original design.'
      -
        handle: business_region
        field:
          type: text
          display: 'Business Region/State'
      -
        handle: business_region_text_style
        field:
          type: text_style
          display: 'Business Region/State Text Controls'
          instructions: 'Use the plus and minus buttons to adjust this text. Reset returns it to the original design.'
      -
        handle: business_country
        field:
          type: text
          display: 'Business Country Code'
      -
        handle: business_country_text_style
        field:
          type: text_style
